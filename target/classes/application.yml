server:
  port: ${PORT:8080}
  servlet:
    context-path: /atheneo

spring:
  datasource:
    url: jdbc:sqlserver://NA-ATHERP\SQL2022;databaseName=ATH_ERP_V17_1;encrypt=false
    username: atheneo_sql
    password: M@ster2016
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        format_sql: false

cors:
