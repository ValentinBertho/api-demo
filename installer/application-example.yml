# ============================================================
# ATHENEO Outlook Add-in API - Exemple de configuration
# Copiez ce fichier vers : <dossier_install>\config\application.yml
# et adaptez les valeurs a votre environnement.
#
# Ce fichier est genere automatiquement par l'installeur Inno Setup.
# Vous pouvez le modifier manuellement apres installation.
# ============================================================

# ── SERVEUR ──────────────────────────────────────────────────
server:
  port: 8080                        # Port d'ecoute de l'API (1024-65535)
  servlet:
    context-path: /atheneo          # Prefixe de toutes les routes : /atheneo/api/...

# ── BASE DE DONNEES ──────────────────────────────────────────
spring:
  datasource:

    # --- Option A : SQL Server avec authentification SQL (recommande) ---
    url: jdbc:sqlserver://NA-ATHERP\SQL2022;databaseName=ATH_ERP_V17_1;encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: atheneo_sql
    password: VotreMotDePasse


  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect 
    hibernate:
      ddl-auto: none                
    show-sql: false                 # Passer a true pour deboguer les requetes SQL
    properties:
      hibernate:
        jdbc:
          batch_size: 25

# ── CORS (Origines autorisees) ────────────────────────────────
# Indiquez l'URL de votre environnement Outlook si connu, ou "*" pour tout autoriser.
# Exemples :
#   "*"                                                -> tout autoriser (dev/test)
#   "https://outlook.office.com"                       -> Outlook Web uniquement
#   "https://outlook.office.com,https://outlook.live.com" -> plusieurs origines

cors:
  allowed:
    origins: "*"

# ── JOURNALISATION ───────────────────────────────────────────
logging:
  level:
    fr:
      mismo: INFO                   # Niveau de log de l'application (DEBUG, INFO, WARN, ERROR)
    org:
      hibernate:
        SQL: WARN                   # Mettre a DEBUG pour voir toutes les requetes SQL
  pattern:
    console: "%d{dd/MM HH:mm:ss} [%-5level] %logger{20} - %msg%n"
  file:
    name: logs/atheneo-api.log      # Chemin du fichier log (relatif au dossier de lancement)
    max-size: 10MB
    max-history: 30                 # Nombre de jours de retention des logs
