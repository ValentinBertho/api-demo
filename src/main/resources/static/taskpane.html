<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHENEO</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:       #7c3aed;
            --primary-light: #a78bfa;
            --primary-glow:  rgba(124, 58, 237, 0.25);
            --success:       #059669;
            --success-light: #6ee7b7;
            --success-glow:  rgba(5, 150, 105, 0.2);
            --error:         #dc2626;
            --error-light:   #fca5a5;
            --error-glow:    rgba(220, 38, 38, 0.2);

            --bg:            #0f0e1a;
            --bg-card:       #18172b;
            --bg-raised:     #211f38;
            --border:        rgba(255,255,255,0.07);
            --border-hover:  rgba(124, 58, 237, 0.5);

            --text-1: #f1f0ff;
            --text-2: #a09ec0;
            --text-3: #6b698a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ─────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .logo svg { display: block; }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.8px;
            color: var(--text-1);
        }

        .header-sub {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 1px;
        }

        .api-pill {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-3);
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 6px #10b981;
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* ── CONTEXTE EMAIL ──────────────────────────────── */
        .email-card {
            margin: 16px 16px 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            flex-shrink: 0;
        }

        .email-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-3);
            margin-bottom: 10px;
        }

        .email-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 0;
        }

        .email-row + .email-row {
            border-top: 1px solid var(--border);
        }

        .email-row-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .email-row-icon svg { display: block; }

        .email-row-body {}

        .email-row-key {
            font-size: 10px;
            color: var(--text-3);
            font-weight: 500;
            margin-bottom: 2px;
        }

        .email-row-val {
            font-size: 13px;
            color: var(--text-1);
            line-height: 1.4;
            word-break: break-word;
        }

        .email-row-val em {
            font-style: normal;
            font-size: 11px;
            color: var(--text-3);
        }

        /* ── ACTIONS ─────────────────────────────────────── */
        .actions-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 16px;
            gap: 12px;
        }

        .action-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 18px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .action-card:hover:not(:disabled) {
            border-color: var(--border-hover);
            box-shadow: 0 0 0 1px var(--primary-glow), 0 8px 24px rgba(0,0,0,0.4);
            transform: translateY(-1px);
            background: var(--bg-raised);
        }

        .action-card:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }

        .action-card:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* état succès */
        .action-card.done {
            border-color: var(--success);
            box-shadow: 0 0 0 1px var(--success-glow), 0 4px 16px var(--success-glow);
            background: rgba(5, 150, 105, 0.06);
            pointer-events: none;
        }

        /* état erreur */
        .action-card.fail {
            border-color: var(--error);
            box-shadow: 0 0 0 1px var(--error-glow);
            background: rgba(220, 38, 38, 0.06);
        }

        .action-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .action-icon-wrap.purple {
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .action-icon-wrap.indigo {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .action-card.done .action-icon-wrap {
            background: var(--success-glow);
            border-color: rgba(5, 150, 105, 0.4);
        }

        .action-card.fail .action-icon-wrap {
            background: var(--error-glow);
            border-color: rgba(220, 38, 38, 0.4);
        }

        .action-body { flex: 1; }

        .action-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 3px;
        }

        .action-desc {
            font-size: 12px;
            color: var(--text-3);
            line-height: 1.4;
        }

        .action-feedback {
            font-size: 11px;
            margin-top: 5px;
            font-weight: 500;
            display: none;
        }

        .action-card.done  .action-feedback { display: block; color: var(--success-light); }
        .action-card.fail  .action-feedback { display: block; color: var(--error-light); }

        .action-arrow {
            color: var(--text-3);
            transition: color 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .action-card:hover:not(:disabled) .action-arrow {
            color: var(--primary-light);
            transform: translateX(3px);
        }

        /* spinner inline */
        .spin {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: var(--primary-light);
            border-radius: 50%;
            animation: rotate 0.7s linear infinite;
            flex-shrink: 0;
        }

        .action-card.loading .spin        { display: block; }
        .action-card.loading .action-arrow { display: none; }
        .action-card.loading { pointer-events: none; opacity: 0.7; }

        @keyframes rotate { to { transform: rotate(360deg); } }

        /* ── TOAST ───────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border: 1px solid;
            backdrop-filter: blur(8px);
            transform: translateY(80px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: rgba(5, 150, 105, 0.12);
            border-color: rgba(5, 150, 105, 0.4);
            color: var(--success-light);
        }

        .toast.error {
            background: rgba(220, 38, 38, 0.12);
            border-color: rgba(220, 38, 38, 0.4);
            color: var(--error-light);
        }

        .toast-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
        .toast-text { flex: 1; line-height: 1.4; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 2L16 14H2L9 2Z" fill="white" fill-opacity=".9"/>
            </svg>
        </div>
        <div>
            <div class="header-title">ATHENEO</div>
            <div class="header-sub">Outlook Add-in</div>
        </div>
        <div class="api-pill">
            <span class="dot"></span>
            <span>Connecté</span>
        </div>
    </div>

    <!-- CONTEXTE EMAIL -->
    <div class="email-card">
        <div class="email-label">Email en cours</div>

        <div class="email-row">
            <div class="email-row-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a09ec0" stroke-width="2" stroke-linecap="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div class="email-row-body">
                <div class="email-row-key">Expéditeur</div>
                <div class="email-row-val" id="emailFrom">Chargement…</div>
            </div>
        </div>

        <div class="email-row">
            <div class="email-row-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a09ec0" stroke-width="2" stroke-linecap="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
            </div>
            <div class="email-row-body">
                <div class="email-row-key">Sujet</div>
                <div class="email-row-val" id="emailSubject">Chargement…</div>
            </div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-wrap">

        <button class="action-card" id="btnSaveMail" onclick="saveMail()">
            <div class="action-icon-wrap purple" id="iconSaveMail">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
            </div>
            <div class="action-body">
                <div class="action-title">Enregistrer le mail</div>
                <div class="action-desc">Archiver cet email dans la base ATHENEO</div>
                <div class="action-feedback" id="fbSaveMail"></div>
            </div>
            <svg class="action-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            <div class="spin"></div>
        </button>

        <button class="action-card" id="btnCreateDemande" onclick="createDemande()">
            <div class="action-icon-wrap indigo" id="iconCreateDemande">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9"  y1="15" x2="15" y2="15"/>
                </svg>
            </div>
            <div class="action-body">
                <div class="action-title">Créer une demande</div>
                <div class="action-desc">Générer une demande avec référence DEM-</div>
                <div class="action-feedback" id="fbCreateDemande"></div>
            </div>
            <svg class="action-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            <div class="spin"></div>
        </button>

        <button class="action-card" id="btnOpenIncident" onclick="openIncident()">
            <div class="action-icon-wrap purple">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8"  x2="12.01" y2="8"/>
                </svg>
            </div>
            <div class="action-body">
                <div class="action-title">Consulter l’incident</div>
                <div class="action-desc">Ouvrir l’incident dans ATHENEO</div>
            </div>
            <svg class="action-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>

    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span class="toast-text" id="toastText"></span>
    </div>

    <script>
        // ─────────────────────────────────────────────────
        // CONFIG
        // ─────────────────────────────────────────────────
        const API_URL = 'https://api-demo-production-3184.up.railway.app/atheneo/api';
        const API_KEY = 'VotreCleAPISecrete123';

        // ─────────────────────────────────────────────────
        // ÉTAT
        // ─────────────────────────────────────────────────
        let senderEmail = '';
        let senderName  = '';
        let mailSubject = '';
        let mailBody    = '';
        let mailDate    = null;

        // ─────────────────────────────────────────────────
        // INIT OFFICE
        // ─────────────────────────────────────────────────
        Office.onReady(info => {
            if (info.host === Office.HostType.Outlook) {
                loadEmailData();
            }
        });

        async function loadEmailData() {
            try {
                const item = Office.context.mailbox.item;

                // Expéditeur
                senderEmail = item.from?.emailAddress || '';
                senderName  = item.from?.displayName  || '';

                if (senderEmail) {
                    document.getElementById('emailFrom').innerHTML =
                        `<strong>${escHtml(senderName)}</strong>`
                        + (senderEmail !== senderName
                            ? ` <em>${escHtml(senderEmail)}</em>`
                            : '');
                } else {
                    document.getElementById('emailFrom').textContent = 'Expéditeur inconnu';
                }

                // Sujet
                mailSubject = item.subject || '(Aucun sujet)';
                document.getElementById('emailSubject').textContent = mailSubject;

                // Date
                mailDate = item.dateTimeCreated || new Date();

                // Corps (async)
                const bodyRes = await new Promise(resolve =>
                    item.body.getAsync(Office.CoercionType.Html, resolve)
                );
                if (bodyRes.status === Office.AsyncResultStatus.Succeeded) {
                    mailBody = bodyRes.value || '';
                }

            } catch (err) {
                console.error('loadEmailData:', err);
                showToast('Erreur lors du chargement du mail', 'error');
            }
        }

        // ─────────────────────────────────────────────────
        // ACTION 1 — Enregistrer le mail
        // ─────────────────────────────────────────────────
        async function saveMail() {
            const btn = document.getElementById('btnSaveMail');
            const fb  = document.getElementById('fbSaveMail');

            if (!validateEmail()) return;

            setLoading(btn, true);

            try {
                const res = await apiCall('/mails', 'POST', {
                    from:      senderEmail,
                    fromName:  senderName,
                    subject:   mailSubject,
                    body:      mailBody,
                    date:      mailDate?.toISOString(),
                    messageId: Office.context.mailbox.item.itemId
                });

                if (res.success) {
                    fb.textContent = `Enregistré · ID ${res.data?.id ?? ''}`;
                    setCardState(btn, 'done');
                    showToast(`Mail archivé avec succès`, 'success');
                } else {
                    throw new Error(res.message || 'Réponse inattendue');
                }

            } catch (err) {
                console.error('saveMail:', err);
                fb.textContent = err.message;
                setCardState(btn, 'fail');
                showToast(`Échec : ${err.message}`, 'error');
                setTimeout(() => resetCard(btn), 4000);
            } finally {
                setLoading(btn, false);
            }
        }

        // ─────────────────────────────────────────────────
        // ACTION 2 — Créer une demande
        // ─────────────────────────────────────────────────
        async function createDemande() {
            const btn = document.getElementById('btnCreateDemande');
            const fb  = document.getElementById('fbCreateDemande');

            if (!validateEmail()) return;

            setLoading(btn, true);

            try {
                const res = await apiCall('/demandes', 'POST', {
                    email:       senderEmail,
                    contactName: senderName,
                    subject:     mailSubject,
                    description: mailBody,
                    source:      'outlook_addin',
                    priority:    'normale',
                    type:        'email'
                });

                if (res.success) {
                    const ref = res.data?.reference ?? '';
                    fb.textContent = `Demande créée · ${ref}`;
                    setCardState(btn, 'done');
                    showToast(`Demande ${ref} créée avec succès`, 'success');
                } else {
                    throw new Error(res.message || 'Réponse inattendue');
                }

            } catch (err) {
                console.error('createDemande:', err);
                fb.textContent = err.message;
                setCardState(btn, 'fail');
                showToast(`Échec : ${err.message}`, 'error');
                setTimeout(() => resetCard(btn), 4000);
            } finally {
                setLoading(btn, false);
            }
        }

        function openIncident() {
    const url = "ath:Consulter?INCIDENT/832666";

    try {
        window.location.href = url;
        showToast("Ouverture de l’incident…", "success");
    } catch (err) {
        console.error("openIncident:", err);
        showToast("Impossible d’ouvrir ATHENEO", "error");
    }
}

        // ─────────────────────────────────────────────────
        // HELPERS UI
        // ─────────────────────────────────────────────────
        function setLoading(btn, on) {
            btn.classList.toggle('loading', on);
        }

        function setCardState(btn, state) {
            btn.classList.remove('done', 'fail');
            if (state) btn.classList.add(state);
        }

        function resetCard(btn) {
            btn.classList.remove('done', 'fail');
            const fb = btn.querySelector('.action-feedback');
            if (fb) fb.textContent = '';
        }

        let toastTimer;
        function showToast(msg, type) {
            const el   = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastText');

            icon.textContent = type === 'success' ? '✓' : '✕';
            text.textContent = msg;
            el.className = `toast show ${type}`;

            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 4500);
        }

        // ─────────────────────────────────────────────────
        // HELPERS API
        // ─────────────────────────────────────────────────
        async function apiCall(endpoint, method, data, retries = 1) {
            let lastErr;
            for (let i = 0; i <= retries; i++) {
                try {
                    const res = await fetch(`${API_URL}${endpoint}`, {
                        method,
                        headers: {
                            'Content-Type':  'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: data ? JSON.stringify(data) : undefined
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (err) {
                    lastErr = err;
                    if (i < retries && !String(err.message).startsWith('HTTP 4'))
                        await wait((i + 1) * 1200);
                    else break;
                }
            }
            throw lastErr;
        }

        function validateEmail() {
            if (!senderEmail || !senderEmail.includes('@')) {
                showToast('Expéditeur introuvable — rechargez le volet', 'error');
                return false;
            }
            return true;
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        function escHtml(s) {
            return String(s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
